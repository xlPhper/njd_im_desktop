<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tauri + Vue + Typescript App</title>
  </head>

  <body>
    <div id="error-log" style="color: red; padding: 20px; white-space: pre-wrap; z-index: 9999; position: fixed; top: 0; left: 0;"></div>
    <script>
      window.addEventListener('error', function(event) {
        document.getElementById('error-log').innerText += event.message + '\n' + (event.error && event.error.stack ? event.error.stack : '') + '\n\n';
      });
      window.addEventListener('unhandledrejection', function(event) {
        document.getElementById('error-log').innerText += 'Unhandled Promise Rejection: ' + event.reason + '\n\n';
      });
    </script>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
